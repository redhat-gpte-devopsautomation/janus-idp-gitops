#helm repo add backstage https://janus-idp.github.io/helm-backstage
#helm repo update
#oc project backstage
#helm install backstage backstage/backstage --values values.yaml
global:
  auth:
    backend:
      enabled: true
  clusterRouterBase: apps.cluster-l9qz2.dynamic2.redhatworkshops.io
  dynamic:
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
      - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-argocd-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/cards
                    importName: TektonCI
                    config:
                      layout:
                        gridColumn: "1 / -1"
                        gridRowStart: 1
                      if:
                        allOf:
                          - isTektonCIAvailable
        disabled: false
      - package: ./dynamic-plugins/dist/immobiliarelabs-backstage-plugin-gitlab-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/immobiliarelabs-backstage-plugin-gitlab
        disabled: false
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-gitlab-dynamic
      - package: ./dynamic-plugins/dist/backstage-community-plugin-quay
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-topology
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-techdocs
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-techdocs-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-ocm
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-ocm-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-tech-radar
      - disabled: false
        package: '@redhat/backstage-plugin-orchestrator-backend-dynamic@1.8.12'
        pluginConfig:
          orchestrator:
            dataIndexService:
              url: http://sonataflow-platform-data-index-service
      - disabled: false
        package: '@redhat/backstage-plugin-orchestrator@1.8.12'
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-orchestrator:
                appIcons:
                - importName: OrchestratorIcon
                  name: orchestratorIcon
                dynamicRoutes:
                - importName: OrchestratorPage
                  menuItem:
                    icon: orchestratorIcon
                    text: Orchestrator
                  path: /orchestrator
      - disabled: false
        package: '@redhat/backstage-plugin-scaffolder-backend-module-orchestrator-dynamic@1.8.12'
        pluginConfig:
          orchestrator:
            dataIndexService:
              url: http://sonataflow-platform-data-index-service
      - disabled: false
        package: '@redhat/backstage-plugin-orchestrator-form-widgets@1.8.12'
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-orchestrator-form-widgets: {}
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-notifications
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-signals
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-signals-backend-dynamic

upstream:
  backstage:
    image:
      registry: quay.io
      repository: rhdh/rhdh-hub-rhel9
      tag: '1.8-218'
      pullSecrets:
      - redhat-gpte-devhub-pull-secret
    extraEnvVars:
      - name: NODE_OPTIONS
        value: --no-node-snapshot
      - name: BACKEND_SECRET
        value: "{{ randAlphaNum 24 | b64enc }}"
      - name: POSTGRES_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            key: postgres-password
            name: backstage-postgresql
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
      - name: KEYCLOAK_CLIENT_ID
        valueFrom:
          secretKeyRef:
            key: CLIENT_ID
            name: keycloak-client-secret-backstage
      - name: KEYCLOAK_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            key: CLIENT_SECRET
            name: keycloak-client-secret-backstage
      - name: LOG_LEVEL
        value: debug
      - name: GITLAB_CLIENT_ID
        valueFrom:
          secretKeyRef:
            key: CLIENT_ID
            name: gitlab-client-secret
      - name: GITLAB_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            key: CLIENT_SECRET
            name: gitlab-client-secret
      - name: GITLAB_TOKEN
        valueFrom:
          secretKeyRef:
            key: TOKEN
            name: gitlab-integration-secret
      - name: QUAY_TOKEN
        valueFrom:
          secretKeyRef:
            key: TOKEN
            name: quay-integration-secret
      - name: ARGOCD_PASSWORD
        valueFrom:
          secretKeyRef:
            key: PASSWORD
            name: argocd-integration-secret
      - name: K8S_SA_TOKEN
        valueFrom:
          secretKeyRef:
            key: TOKEN
            name: kubernetes-sa-secret

    appConfig:
      app:
        baseUrl: https://backstage-backstage.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
      backend:
        baseUrl: https://backstage-backstage.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
        listen:
          port: 7007
          host: 0.0.0.0
        csp:
          script-src: ["'self'", "'unsafe-inline'", "'unsafe-eval'"]
          script-src-elem: ["'self'", "'unsafe-inline'", "'unsafe-eval'"]
          img-src: ["'self'", 'data:']
          connect-src: ["'self'", 'http:', 'https:', 'data:']
        cors:
          origin: https://backstage-backstage.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
          methods: [GET, POST, PUT, DELETE]
          credentials: true
        database:
          client: pg
          connection:
            database: postgres
            host: "${POSTGRES_HOST}"
            port: "${POSTGRES_PORT}"
            user: postgres
            password: "${POSTGRES_ADMIN_PASSWORD}"
        reading:
          allow:
            - host: '*.apps.cluster-l9qz2.dynamic2.redhatworkshops.io'

      integrations:
        gitlab:
        - host: gitlab-gitlab.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
          baseUrl: http://gitlab.gitlab.svc.cluster.local
          apiBaseUrl: http://gitlab.gitlab.svc.cluster.local/api/v4
          token: ${GITLAB_TOKEN}

      proxy:
        endpoints:
          '/quay/api':
            target: 'https://quay-l9qz2-1.apps.cluster-l9qz2.dynamic2.redhatworkshops.io'
            headers:
              X-Requested-With: 'XMLHttpRequest'
              # Uncomment the following line to access a private Quay Repository using a token
              Authorization: 'Bearer ${QUAY_TOKEN}'
            changeOrigin: true
            # Change to "false" in case of using self hosted quay instance with a self-signed certificate
            secure: false
          '/developer-hub':
            target: http://gitlab.gitlab.svc.cluster.local/
            pathRewrite:
              '^/api/proxy/developer-hub/tech-radar': /gitops/janus-idp-gitops/-/raw/main/config/tech-radar.json
              '^/api/proxy/developer-hub/learning-paths': '/rhdh/learning-paths/-/raw/main/data.json'
            changeOrigin: true
            secure: false

      quay:
        # The UI url for Quay, used to generate the link to Quay
        uiUrl: 'https://quay-l9qz2-1.apps.cluster-l9qz2.dynamic2.redhatworkshops.io'

      techdocs:
        builder: local
        generator:
          runIn: local
        publisher:
          type: local

      auth:
        environment: production
        providers:
          gitlab:
            production:
              clientId: ${GITLAB_CLIENT_ID}
              clientSecret: ${GITLAB_CLIENT_SECRET}
              audience: http://gitlab.gitlab.svc.cluster.local
              callbackUrl: https://backstage-backstage.apps.cluster-l9qz2.dynamic2.redhatworkshops.io/api/auth/gitlab/handler/frame
              signIn:
                resolvers:
                  - resolver: emailMatchingUserEntityProfileEmail
                  - resolver: emailLocalPartMatchingUserEntityName
                  - resolver: usernameMatchingUserEntityName
        session:
          secret:
            $env: 'BACKEND_SECRET'

      signInPage: gitlab

      scaffolder:
        # see https://backstage.io/docs/features/software-templates/configuration for software template options

      catalog:
        rules:
          - allow: [Domain, Component, System, API, Resource, Location, Template]
        locations:
          - target: https://gitlab-gitlab.apps.cluster-l9qz2.dynamic2.redhatworkshops.io/rhdh/developer-hub-software-templates/blob/main/showcase-templates.yaml
            type: url
            rules:
              - allow: [Template]
          - target: https://gitlab-gitlab.apps.cluster-l9qz2.dynamic2.redhatworkshops.io/rhdh/developer-hub-software-templates/blob/main/org.yaml
            type: url
            rules:
              - allow: [Group, User]
          - target: https://gitlab-gitlab.apps.cluster-l9qz2.dynamic2.redhatworkshops.io/summit-lab/backstage-workshop/blob/master/showcase-templates.yaml
            type: url
            rules:
              - allow: [Template]
          - target: https://gitlab-gitlab.apps.cluster-l9qz2.dynamic2.redhatworkshops.io/rhdh-entities/rhdh-demo-entities/blob/main/locations.yaml
            type: url
            rules:
              - allow: [Domain, Component, System, API, Resource, Location]
        providers:
          gitlab:
            selfHosted:
              host: gitlab-gitlab.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
              schedule: # optional; same options as in TaskScheduleDefinition
                # supports cron, ISO duration, "human duration" as used in code
                frequency: { seconds: 10 }
                # supports ISO duration, "human duration" as used in code
                timeout: { seconds: 60 }
          ocm:
            default:
              name: multiclusterhub
              kubernetesPluginRef: dev-cluster-infra
              schedule: # optional; same options as in TaskScheduleDefinition
                # supports cron, ISO duration, "human duration" as used in code
                frequency: { seconds: 10 }
                # supports ISO duration, "human duration" as used in code
                timeout: { seconds: 60 }
              owner: group:rhdh
          keycloakOrg:
            default:
              baseUrl: keycloak-rhsso.apps.cluster-l9qz2.dynamic2.redhatworkshops.io/auth
              loginRealm: backstage
              realm: backstage
              clientId: ${KEYCLOAK_CLIENT_ID}
              clientSecret: ${KEYCLOAK_CLIENT_SECRET}

      argocd:
        appLocatorMethods:
          - type: 'config'
            instances:
              - name: main
                url: 	https://argocd-server-janus-argocd.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
                username: admin
                password: ${ARGOCD_PASSWORD}

      kubernetes:
        serviceLocatorMethod:
          type: "multiTenant"
        clusterLocatorMethods:
          - type: "config"
            clusters:
              - name: dev-cluster-infra
                url: https://api.cluster-l9qz2.dynamic2.redhatworkshops.io:6443
                authProvider: "serviceAccount"
                skipTLSVerify: true
                serviceAccountToken: ${K8S_SA_TOKEN}
        customResources:
          - group: 'tekton.dev'
            apiVersion: 'v1beta1'
            plural: 'pipelineruns'
          - group: 'tekton.dev'
            apiVersion: 'v1beta1'
            plural: 'taskruns'
          - group: 'route.openshift.io'
            apiVersion: 'v1'
            plural: 'routes'

      permission:
        enabled: false

      enabled:
        kubernetes: true
        techdocs: true
        argocd: true
        sonarqube: false
        keycloak: true
        ocm: true
        github: false
        githubOrg: false
        gitlab: true
        jenkins: false
        permission: false

  postgresql:
    auth:
      username: bn_backstage
      password: DDUF4iHeOaDh
      database: postgres

      # Admin user (superuser)
      postgresUser: postgres
      postgresPassword: DDUF4iHeOaDh

  service:
    ports:
      backend: 7007
      targetPort: backend

route:
  enabled: true
  host: backstage-backstage.apps.cluster-l9qz2.dynamic2.redhatworkshops.io
  tls:
    enabled: true
    termination: "edge"

orchestrator:
  enabled: true
  serverlessLogicOperator:
    enabled: true
  serverlessOperator:
    enabled: true
  sonataflowPlatform:
    monitoring:
      enabled: true
    eventing:
      broker:
        name: ""
        namespace: ""
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    # -- Secret name for the user-created secret to connect an external DB
    externalDBsecretRef: ""
    # -- Name for the user-configured external Database
    externalDBName: ""
    # -- Host for the user-configured external Database
    externalDBHost: ""
    # -- Port for the user-configured external Database
    externalDBPort: ""
    # -- Image for the init container used by the create-db job

    initContainerImage: "{{ .Values.upstream.postgresql.image.registry }}/{{ .Values.upstream.postgresql.image.repository }}:{{ .Values.upstream.postgresql.image.tag }}"
    # -- Image for the container used by the create-db job
    createDBJobImage: "{{ .Values.upstream.postgresql.image.registry }}/{{ .Values.upstream.postgresql.image.repository }}:{{ .Values.upstream.postgresql.image.tag }}"
  # -- Orchestrator plugins and their configuration
  plugins: []
